services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF on so the click queue survives restarts
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      APP_URL: ${APP_URL}
      GEOIP_DB_PATH: ${GEOIP_DB_PATH}
    # `db push` syncs schema → db without a migration history. fine for self-host.
    # for real prod with multi-instance deploys, switch to `prisma migrate deploy`
    # and commit a prisma/migrations/ folder.
    command: sh -c "npx prisma db push --accept-data-loss && npx next start -p 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data:ro

  worker:
    build: .
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GEOIP_DB_PATH: ${GEOIP_DB_PATH}
    command: ["npx", "tsx", "workers/click-drainer.ts"]
    volumes:
      - ./data:/app/data:ro

volumes:
  pgdata:
  redisdata:
